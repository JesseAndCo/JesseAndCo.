<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JesseAndCo Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e1b4b);
  color: white;
}

/* HEADER */
header {
  background: linear-gradient(90deg, #f43f5e, #3b82f6, #22c55e);
  padding: 16px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* TABS */
.tab-bar {
  display: flex;
  background: #111827;
}

.tab-bar button {
  flex: 1;
  padding: 14px;
  border: none;
  background: transparent;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.tab-bar button:hover {
  background: rgba(255,255,255,0.1);
}

/* SECTIONS */
.section {
  display: none;
  padding: 20px;
}

.active {
  display: block;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* BUTTONS */
button.action {
  padding: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 8px 5px;
  font-weight: bold;
}

.green { background: #22c55e; color: black; }
.red { background: #ef4444; color: white; }
.blue { background: #3b82f6; color: white; }
.purple { background: #a855f7; color: white; }

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<header>🌈 JesseAndCo Neighborhood Hub</header>

<div class="tab-bar">
  <button onclick="openTab('home')">Home</button>
  <button onclick="openTab('calendar')">Calendar</button>
  <button onclick="openTab('info')">Info</button>
  <button onclick="openTab('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home" class="section active">
  <div class="card">
    <h2>Status</h2>
    <p id="statusText">Not coming through</p>

    <button class="action green" onclick="coming()">Coming Through</button>
    <button class="action red" onclick="notComing()">Not Coming</button>
  </div>
</div>

<!-- CALENDAR -->
<div id="calendar" class="section">
  <div class="card">
    <h2>📅 Calendar</h2>
    <iframe 
      src="https://calendar.google.com/calendar/embed?src=YOUR_CALENDAR_ID&ctz=America%2FNew_York"
      style="width:100%; height:400px; border:0; border-radius:10px;">
    </iframe>
  </div>
</div>

<!-- INFO -->
<div id="info" class="section">
  <div class="card">
    <h2>📝 Important Info</h2>
    <p id="infoText">No updates yet.</p>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <div class="card">
    <h2>🔐 Admin Panel</h2>

    <input id="code" placeholder="Enter admin code">
    <button class="action purple" onclick="unlock()">Unlock</button>

    <div id="adminTools" style="display:none;">
      <h3>Status Control</h3>
      <button class="action green" onclick="coming()">Set Coming</button>
      <button class="action red" onclick="notComing()">Set Not Coming</button>

      <h3>Info Update</h3>
      <textarea id="newInfo" placeholder="Update neighborhood info"></textarea>
      <button class="action blue" onclick="updateInfo()">Save Info</button>
    </div>
  </div>
</div>

<script>

/* TABS */
function openTab(tab) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

/* STATUS */
let status = localStorage.getItem("status") || "Not coming through";
document.getElementById("statusText").innerText = status;

function coming() {
  status = "Coming Through – Be Ready";
  localStorage.setItem("status", status);
  document.getElementById("statusText").innerText = status;
}

function notComing() {
  status = "Not coming through";
  localStorage.setItem("status", status);
  document.getElementById("statusText").innerText = status;
}

/* INFO */
let info = localStorage.getItem("info") || "No updates yet.";
document.getElementById("infoText").innerText = info;

function updateInfo() {
  const newInfo = document.getElementById("newInfo").value;
  localStorage.setItem("info", newInfo);
  document.getElementById("infoText").innerText = newInfo;
}

/* ADMIN */
function unlock() {
  const code = document.getElementById("code").value;

  if (code === "082712") {
    document.getElementById("adminTools").style.display = "block";
    alert("Admin unlocked");
  } else {
    alert("Wrong code");
  }
}

</script>

</body>
</html>
